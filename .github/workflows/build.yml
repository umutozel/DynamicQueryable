name: Build and Test

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'test/**'
    tags:
      - 'v*'

  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      NUGET_XMLDOC_MODE: skip
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Run tests with coverage
        run: dotnet test test/DynamicQueryable.Tests --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput=../../opencoverCoverage.xml

      - name: Upload coverage to Codecov
        run: |
          curl -s https://codecov.io/bash > codecov
          bash codecov -f opencoverCoverage.xml -t ${{ secrets.CODECOV_TOKEN }}

      - name: Pack NuGet package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Packing DynamicQueryable $VERSION"
          dotnet pack src/DynamicQueryable/DynamicQueryable.csproj --configuration Release -p:Version="$VERSION" --output packages

      - name: Publish NuGet package (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "packages/DynamicQueryable.*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
